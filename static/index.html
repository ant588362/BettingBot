<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sports Circuit Picks</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#07090f;
    --s1:#0d111c;
    --s2:#121828;
    --s3:#1a2235;
    --border:#1f2c42;
    --border2:#283550;
    --amber:#d4920a;
    --amber-dim:#b37a08;
    --green:#18c964;
    --red:#f3454a;
    --blue:#4a8fff;
    --cyan:#00b8d9;
    --text:#dde4f0;
    --text2:#8fa3c0;
    --text3:#4d6080;
    --r:12px;
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;overflow:hidden}
  svg{display:block}

  /* ─── LAYOUT ─────────────────────────────────────────────────────────────── */
  .app{display:flex;flex-direction:column;height:100vh}
  .panels{flex:1;overflow:hidden;position:relative}
  .panel{position:absolute;inset:0;overflow-y:auto;padding:18px;display:none}
  .panel.active{display:block}
  .panel::-webkit-scrollbar{width:3px}
  .panel::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

  /* ─── HEADER ─────────────────────────────────────────────────────────────── */
  .hdr{
    background:var(--s1);border-bottom:1px solid var(--border);
    padding:13px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
  }
  .hdr-left{display:flex;align-items:center;gap:11px}
  .hdr-icon{
    width:38px;height:38px;border-radius:9px;flex-shrink:0;
    background:var(--s2);border:1px solid var(--border2);
    display:flex;align-items:center;justify-content:center;
  }
  .hdr-title{font-size:15px;font-weight:800;letter-spacing:-.2px}
  .hdr-sub{font-size:11px;color:var(--text3);margin-top:2px;font-weight:500}
  .live-pill{
    display:flex;align-items:center;gap:6px;
    background:var(--s2);border:1px solid var(--border2);
    border-radius:20px;padding:5px 12px;font-size:11px;font-weight:700;
    color:var(--green);letter-spacing:.5px;
  }
  .live-dot{
    width:6px;height:6px;border-radius:50%;background:var(--green);
    animation:blink 1.8s ease-in-out infinite;
  }
  @keyframes blink{0%,100%{opacity:1;box-shadow:0 0 4px var(--green)}50%{opacity:.3;box-shadow:none}}

  /* ─── TABS ───────────────────────────────────────────────────────────────── */
  .tabs{display:flex;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0;padding:0 6px}
  .tab{
    flex:1;padding:12px 6px;text-align:center;font-size:11px;font-weight:700;
    color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;
    transition:all .18s;letter-spacing:.4px;text-transform:uppercase;
    display:flex;align-items:center;justify-content:center;gap:6px;
  }
  .tab.active{color:var(--amber);border-bottom-color:var(--amber)}
  .tab:hover:not(.active){color:var(--text2)}
  .tab svg{flex-shrink:0}

  /* ─── SECTION LABEL ──────────────────────────────────────────────────────── */
  .slabel{
    font-size:10px;font-weight:700;text-transform:uppercase;
    letter-spacing:1.5px;color:var(--text3);margin-bottom:12px;
  }

  /* ─── PICK CARDS ─────────────────────────────────────────────────────────── */
  .pick-card{
    background:var(--s1);border:1px solid var(--border);
    border-radius:var(--r);padding:16px;margin-bottom:10px;
    transition:border-color .2s,transform .15s;
  }
  .pick-card:hover{border-color:var(--border2);transform:translateY(-1px)}
  .pick-card.lock{border-color:#d4920a30}
  .pick-card.longshot{border-color:#4a8fff30}

  .pick-tag{
    display:inline-flex;align-items:center;gap:5px;
    font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;
    border-radius:5px;padding:3px 8px;margin-bottom:11px;
  }
  .pick-tag.lock{background:#d4920a14;color:var(--amber);border:1px solid #d4920a28}
  .pick-tag.top{background:#18c96414;color:var(--green);border:1px solid #18c96428}
  .pick-tag.longshot{background:#4a8fff14;color:var(--blue);border:1px solid #4a8fff28}

  .pick-matchup{font-size:15px;font-weight:800;margin-bottom:4px;letter-spacing:-.2px}
  .pick-sel{font-size:13px;font-weight:600;color:var(--amber);margin-bottom:10px}

  .pick-pills{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:11px}
  .pill{
    background:var(--s2);border:1px solid var(--border);
    border-radius:5px;padding:3px 9px;font-size:11px;font-weight:600;color:var(--text3);
  }
  .pill.sport{text-transform:uppercase;letter-spacing:.5px}
  .pill.odds{color:var(--cyan);border-color:#00b8d920;background:#00b8d908}
  .pill.units{color:var(--green);border-color:#18c96420;background:#18c96408}

  .conf-row{display:flex;align-items:center;gap:9px;margin-bottom:11px}
  .conf-lbl{font-size:10px;color:var(--text3);font-weight:600;width:68px;flex-shrink:0}
  .conf-track{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
  .conf-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--amber-dim),var(--green));transition:width .7s ease}
  .conf-num{font-size:10px;color:var(--text3);font-weight:700;width:24px;text-align:right;flex-shrink:0}

  .pick-analysis{font-size:12.5px;color:var(--text3);line-height:1.65;border-top:1px solid var(--border);padding-top:10px}

  .empty-state{text-align:center;padding:60px 20px}
  .empty-icon{
    width:52px;height:52px;border-radius:14px;background:var(--s2);border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;margin:0 auto 14px;
  }
  .empty-state h3{font-size:16px;font-weight:700;margin-bottom:6px}
  .empty-state p{font-size:13px;color:var(--text3);line-height:1.6}

  .spin-wrap{text-align:center;padding:50px;color:var(--text3);font-size:12px}
  .spinner{
    width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--amber);
    border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ─── CHAT ───────────────────────────────────────────────────────────────── */
  #panel-chat{padding:0;flex-direction:column}
  .chat-msgs{flex:1;overflow-y:auto;padding:16px}
  .chat-msgs::-webkit-scrollbar{width:3px}
  .chat-msgs::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

  .msg{display:flex;gap:9px;margin-bottom:14px;animation:msgIn .2s ease}
  @keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .msg.user{flex-direction:row-reverse}
  .msg-av{
    width:30px;height:30px;border-radius:8px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
  }
  .msg-av.bot{background:var(--s2);border:1px solid var(--border2)}
  .msg-av.user{background:var(--s3);border:1px solid var(--border2)}

  .msg-bub{
    max-width:84%;padding:11px 15px;font-size:13.5px;line-height:1.65;border-radius:12px;
  }
  .msg.bot .msg-bub{
    background:var(--s1);border:1px solid var(--border);
    color:var(--text);border-top-left-radius:3px;
  }
  .msg.user .msg-bub{
    background:var(--s3);border:1px solid var(--border2);
    color:var(--text);border-top-right-radius:3px;
  }
  .msg.typing .msg-bub{color:var(--text3);font-style:italic}

  .chat-suggs{display:flex;gap:7px;flex-wrap:wrap;padding:0 16px 10px}
  .sugg{
    background:var(--s1);border:1px solid var(--border);border-radius:20px;
    padding:6px 13px;font-size:11.5px;font-weight:500;color:var(--text2);
    cursor:pointer;transition:all .18s;white-space:nowrap;
  }
  .sugg:hover{border-color:var(--amber);color:var(--amber);background:#d4920a08}

  .chat-bottom{padding:12px 14px 14px;border-top:1px solid var(--border);background:var(--s1)}
  .chat-row{display:flex;gap:9px;align-items:center}
  #chat-in{
    flex:1;background:var(--bg);border:1px solid var(--border);
    border-radius:22px;padding:10px 17px;color:var(--text);
    font-size:13.5px;font-family:inherit;outline:none;transition:border-color .18s;
  }
  #chat-in:focus{border-color:#d4920a50}
  #chat-in::placeholder{color:var(--text3)}
  .send-btn{
    width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;flex-shrink:0;
    background:var(--s2);border:1px solid var(--border2);
    display:flex;align-items:center;justify-content:center;
    transition:background .18s,border-color .18s;
    color:var(--amber);
  }
  .send-btn:hover{background:var(--s3);border-color:var(--amber)}
  .send-btn:disabled{opacity:.3;cursor:not-allowed}

  /* ─── RECORD ─────────────────────────────────────────────────────────────── */
  .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:16px}
  .stat-box{
    background:var(--s1);border:1px solid var(--border);
    border-radius:var(--r);padding:18px 14px;text-align:center;
  }
  .stat-val{font-size:28px;font-weight:900;letter-spacing:-1px;margin-bottom:4px}
  .stat-val.g{color:var(--green)}
  .stat-val.r{color:var(--red)}
  .stat-val.a{color:var(--amber)}
  .stat-lbl{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px}

  .divider{display:flex;align-items:center;gap:10px;margin:14px 0 12px}
  .divider span{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);white-space:nowrap}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-left">
      <div class="hdr-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#d4920a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
      </div>
      <div>
        <div class="hdr-title">Sports Circuit</div>
        <div class="hdr-sub">AI-Powered Daily Picks</div>
      </div>
    </div>
    <div class="live-pill"><div class="live-dot"></div>LIVE</div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('picks')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
      Picks
    </div>
    <div class="tab" onclick="switchTab('chat')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      AI Chat
    </div>
    <div class="tab" onclick="switchTab('record')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Record
    </div>
  </div>

  <!-- PANELS -->
  <div class="panels">

    <!-- PICKS -->
    <div id="panel-picks" class="panel active">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div class="slabel" style="margin:0">Today's Picks</div>
        <div id="picks-ts" style="font-size:11px;color:var(--text3)"></div>
      </div>
      <div id="picks-body">
        <div class="spin-wrap"><div class="spinner"></div>Loading picks…</div>
      </div>
    </div>

    <!-- CHAT -->
    <div id="panel-chat" class="panel" style="display:none;flex-direction:column">
      <div class="chat-msgs" id="chat-msgs">
        <div class="msg bot">
          <div class="msg-av bot">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#d4920a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          </div>
          <div class="msg-bub">Hey! I'm your AI sports analyst. Ask me about tonight's games, lines, matchups, or parlay ideas. What do you want to know?</div>
        </div>
      </div>
      <div class="chat-suggs" id="suggs">
        <div class="sugg" onclick="useSugg(this)">Best pick tonight?</div>
        <div class="sugg" onclick="useSugg(this)">Any NBA plays?</div>
        <div class="sugg" onclick="useSugg(this)">Best parlay?</div>
        <div class="sugg" onclick="useSugg(this)">Any underdogs?</div>
      </div>
      <div class="chat-bottom">
        <div class="chat-row">
          <input id="chat-in" type="text" placeholder="Ask about any game or pick…" onkeydown="if(event.key==='Enter')sendMsg()"/>
          <button class="send-btn" id="send-btn" onclick="sendMsg()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- RECORD -->
    <div id="panel-record" class="panel">
      <div id="rec-body">
        <div class="spin-wrap"><div class="spinner"></div>Loading record…</div>
      </div>
    </div>

  </div>
</div>

<script>
// ── Tab switching ────────────────────────────────────────────────────────────
const TABS=['picks','chat','record'];
function switchTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',TABS[i]===name));
  document.querySelectorAll('.panel').forEach(p=>{p.classList.remove('active');p.style.display='none'});
  const el=document.getElementById('panel-'+name);
  el.classList.add('active');
  el.style.display=(name==='chat')?'flex':'block';
  if(name==='record'&&!window._recDone)loadRecord();
  if(name==='chat')scrollChat();
}

// ── Picks ────────────────────────────────────────────────────────────────────
async function loadPicks(){
  try{
    const r=await fetch('/api/picks/today');
    if(r.status===404){renderNoPicks();return}
    if(!r.ok)throw new Error(r.status);
    renderPicks(await r.json());
  }catch(e){
    document.getElementById('picks-body').innerHTML=`
      <div class="empty-state">
        <div class="empty-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#d4920a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </div>
        <h3>Connection Error</h3>
        <p>Couldn't reach the server.<br>Try refreshing.</p>
      </div>`;
  }
}

function pct(n){return Math.min(100,Math.max(0,((parseInt(n)||3)/5)*100))}

function pickCard(pk,type){
  const tagTxt=type==='lock'?'Lock of the Day':type==='longshot'?'Longshot':'Top Play';
  const tagIcon=type==='lock'
    ?'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>'
    :type==='longshot'
    ?'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="22" y1="12" x2="18" y2="12"/><line x1="6" y1="12" x2="2" y2="12"/><line x1="12" y1="6" x2="12" y2="2"/><line x1="12" y1="22" x2="12" y2="18"/></svg>'
    :'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';
  return`<div class="pick-card ${type}">
    <div class="pick-tag ${type}">${tagIcon}${tagTxt}</div>
    <div class="pick-matchup">${pk.teams||pk.matchup||''}</div>
    <div class="pick-sel">${pk.pick||''}</div>
    <div class="pick-pills">
      ${pk.sport?`<span class="pill sport">${pk.sport}</span>`:''}
      ${pk.odds?`<span class="pill odds">${pk.odds}</span>`:''}
      ${pk.units?`<span class="pill units">${pk.units}u</span>`:''}
    </div>
    <div class="conf-row">
      <span class="conf-lbl">Confidence</span>
      <div class="conf-track"><div class="conf-fill" style="width:${pct(pk.confidence)}%"></div></div>
      <span class="conf-num">${pk.confidence||3}/5</span>
    </div>
    <div class="pick-analysis">${pk.analysis||''}</div>
  </div>`
}

function renderPicks(data){
  const ts=data.generated_at?new Date(data.generated_at).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}):'';
  document.getElementById('picks-ts').textContent=ts?'Updated '+ts:'';
  const p=data.picks||{};
  let html='';
  if(p.lock_of_the_day)html+=pickCard(p.lock_of_the_day,'lock');
  (p.top_picks||[]).forEach(pk=>html+=pickCard(pk,'top'));
  (p.longshots||[]).forEach(pk=>html+=pickCard(pk,'longshot'));
  document.getElementById('picks-body').innerHTML=html||renderNoPicks();
}

function renderNoPicks(){
  document.getElementById('picks-body').innerHTML=`
    <div class="empty-state">
      <div class="empty-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#d4920a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </div>
      <h3>Picks dropping soon</h3>
      <p>Daily picks post at <strong>10am ET</strong>.<br>Check back soon or ask the AI Chat!</p>
    </div>`;
}

// ── Chat ─────────────────────────────────────────────────────────────────────
async function sendMsg(){
  const inp=document.getElementById('chat-in');
  const msg=inp.value.trim();
  if(!msg)return;
  inp.value='';
  document.getElementById('send-btn').disabled=true;
  document.getElementById('suggs').style.display='none';
  addMsg('user',msg);
  const t=addMsg('bot','Analyzing…',true);
  try{
    const r=await fetch('/api/analyze',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({query:msg,member_id:'member'})
    });
    const d=await r.json();
    t.remove();
    addMsg('bot',d.analysis||d.detail||'Something went wrong. Try again!');
  }catch(e){
    t.remove();
    addMsg('bot','Connection error. Please try again.');
  }
  document.getElementById('send-btn').disabled=false;
}

function useSugg(el){document.getElementById('chat-in').value=el.textContent;sendMsg()}

function addMsg(role,text,typing=false){
  const wrap=document.getElementById('chat-msgs');
  const d=document.createElement('div');
  d.className='msg '+role+(typing?' typing':'');
  const av=role==='bot'
    ?'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#d4920a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>'
    :'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#8fa3c0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>';
  d.innerHTML=`<div class="msg-av ${role}">${av}</div><div class="msg-bub">${text.replace(/\n/g,'<br>')}</div>`;
  wrap.appendChild(d);
  scrollChat();
  return d;
}
function scrollChat(){const w=document.getElementById('chat-msgs');if(w)w.scrollTop=w.scrollHeight}

// ── Record ────────────────────────────────────────────────────────────────────
async function loadRecord(){
  try{
    const r=await fetch('/api/record');
    const d=await r.json();
    renderRecord(d);
    window._recDone=true;
  }catch(e){
    document.getElementById('rec-body').innerHTML='<div class="empty-state"><h3>Could not load record</h3></div>';
  }
}
function roiHTML(v){
  const n=parseFloat(v||0);
  return`<div class="stat-val ${n>=0?'g':'r'}">${n>=0?'+':''}${n.toFixed(1)}%</div>`;
}
function renderRecord(d){
  const at=d.all_time||{},wk=d.last_7_days||{};
  document.getElementById('rec-body').innerHTML=`
    <div class="slabel">All-Time Record</div>
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-val g">${at.wins||0}</div><div class="stat-lbl">Wins</div></div>
      <div class="stat-box"><div class="stat-val r">${at.losses||0}</div><div class="stat-lbl">Losses</div></div>
      <div class="stat-box"><div class="stat-val a">${at.win_pct||'—'}</div><div class="stat-lbl">Win Rate</div></div>
      <div class="stat-box">${roiHTML(at.roi)}<div class="stat-lbl">ROI</div></div>
    </div>
    <div class="divider"><span>Last 7 Days</span></div>
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-val g">${wk.wins||0}</div><div class="stat-lbl">Wins</div></div>
      <div class="stat-box"><div class="stat-val r">${wk.losses||0}</div><div class="stat-lbl">Losses</div></div>
      <div class="stat-box"><div class="stat-val a">${wk.win_pct||'—'}</div><div class="stat-lbl">Win Rate</div></div>
      <div class="stat-box">${roiHTML(wk.roi)}<div class="stat-lbl">ROI (7d)</div></div>
    </div>`;
}

loadPicks();
</script>
</body>
